    post:
      operationId: post_product_uuid
      x-visibility: public
      summary: Create a new product
      description: |
        This endpoint allows you to create a new product.
        Permissions based on your user groups are applied to the product you try to create.
        If no uuid is provided, the PIM will generate one for you.
      tags:
        - Product [uuid]
      security:
        - bearerToken: []
      parameters:
        - in: query
          name: create_missing_options
          description: |
            When present in the query string (regardless of value), automatically creates missing attribute options during product/product model creation or update.
            This only works for simple select and multi select attributes that have the `enable_option_creation_during_import` property set to `true` (configurable via the Attribute API).
          required: false
          schema: &ref_6
            type: string
          example: ''
      requestBody:
        description: Body of a product creation request
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid:
                  type: string
                  description: Product UUID
                  example: fc24e6c3-933c-4a93-8a81-e5c703d134d5
                enabled:
                  type: boolean
                  description: Whether the product is enabled
                  default: true
                  example: true
                family:
                  type:
                    - string
                    - 'null'
                  description: |
                    [Family](https://api.akeneo.com/api-reference.html#Family) code from which the product inherits its attributes and attributes requirements.
                    In the case of variant product, the given family should be the same as the product model family.
                  default: null only in the case of a non variant product
                  x-validation-rules: It is equal to an existing family code
                  example: smartphone
                categories:
                  type: array
                  description: Codes of the [categories](https://api.akeneo.com/api-reference.html#Category) in which the product is classified
                  items:
                    type: string
                  default: []
                  x-validation-rules: Each string of the array is equal to an existing category code
                  example:
                    - smartphones
                    - electronics
                groups:
                  type: array
                  description: Codes of the groups to which the product belong
                  items:
                    type: string
                  default: []
                  x-validation-rules: Each string of the array is equal to an existing group code
                  example:
                    - summer_collection
                    - sale
                parent:
                  type:
                    - string
                    - 'null'
                  description: Code of the parent [product model](https://api.akeneo.com/api-reference.html#Productmodel) when the product is a variant
                  default: null
                  x-validation-rules: It is equal to an existing product model code only if the product is variant otherwise it's equal to null
                  example: my_super_battery
                values:
                  type: object
                  description: |
                    Product attributes values.
