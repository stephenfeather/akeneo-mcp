      x-visibility: public
      summary: Approve a modelization suggestion
      description: |
        Approves a modelization suggestion and creates the corresponding attributes in the PIM.
        The suggestion must be in DRAFT status and have CoreAI attributes available.
        Optional overrides can be provided for the attribute code, type, labels, group, scopable, and localizable.
      tags:
        - Data Architect Agent
      security:
        - bearerToken: []
      parameters:
        - in: path
          name: uuid
          description: |
            This path parameter is used to specify the unique identifier of the entity you want to retrieve or manipulate.
            It is essential for identifying the specific entity in the API requests.
            Ensure that the UUID is correctly formatted and corresponds to an existing entity in the system.
          required: true
          schema: *ref_23
          example: 123e4567-e89b-12d3-a456-426614174000
      requestBody:
        description: Optional overrides for the attribute being approved
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Optional overrides for the attribute being approved
              properties:
                attribute_code:
                  type: string
                  description: Override the attribute code
                  example: product_sku
                attribute_type:
                  type: string
                  description: Override the attribute type
                  example: pim_catalog_text
                attribute_labels:
                  type: object
                  description: Override the attribute labels by locale
                  additionalProperties:
                    type: string
                  example:
                    en_US: Product SKU
                    fr_FR: SKU Produit
                attribute_group:
                  type: string
                  description: Override the attribute group code
                  example: marketing
                scopable:
                  type: boolean
                  nullable: true
                  description: Override whether the attribute is scopable
                  example: true
                localizable:
                  type: boolean
                  nullable: true
                  description: Override whether the attribute is localizable
                  example: true
            example:
              attribute_code: product_sku
              attribute_type: pim_catalog_text
              attribute_labels:
                en_US: Product SKU
                fr_FR: SKU Produit
              attribute_group: marketing
              scopable: true
              localizable: true
      responses:
        '200':
          description: Modelization suggestion successfully approved
          content:
            application/json:
              schema:
                type: object
                description: Result of approving a modelization suggestion
                properties:
                  created:
                    type: array
                    description: List of attribute codes that were successfully created
                    items:
                      type: string
                    example:
                      - product_sku
                      - product_name
                  skipped:
                    type: array
                    description: List of attribute codes that were skipped because they already exist
                    items:
                      type: string
                    example:
                      - existing_attribute
                  errors:
                    type: object
                    description: Map of attribute codes to error messages for attributes that failed to create
                    additionalProperties:
                      type: string
                    example:
                      invalid_attr: Attribute type is not valid
              example:
                created:
                  - product_sku
                  - product_name
                skipped: []
                errors: {}
