      description: This endpoint allows you to create a new media file and associate it to an attribute value of a given product or product model
      tags:
        - Product media file
      security:
        - bearerToken: []
      parameters:
        - in: header
          name: Content-Type
          description: |
            Equal to 'multipart/form-data' (with [boundary value](https://www.w3.org/TR/html401/interact/forms.html#h-17.13.4.2)), no other value allowed.
