                configuration[labels][fr_FR]:
                  type: string
                  description: Label translation for French (France)
                  example: Mon Extension Personnalisée
                configuration[custom_variables]:
                  type: string
                  description: JSON string of custom variables
                  example: '{"apiEndpoint": "https://api.example.com"}'
                credentials[0][code]:
