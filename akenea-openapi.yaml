  /api/rest/v1/asset-families/{asset_family_code}/assets:
    get:
      operationId: get_assets
      x-visibility: public
      summary: Get the list of the assets of a given asset family
      description: |
        This endpoint allows you to get a list of assets of a given asset family.
        Assets are paginated.
        This endpoint is case sensitive on the asset family code.
      tags:
        - Asset
      security:
        - bearerToken: []
      parameters:
        - name: search
          in: query
          description: |
            Filter assets,
            for more details see the [Asset filters](https://api.akeneo.com/documentation/filter.html#filter-assets) section.
          required: false
          schema:
            type: string
          examples:
            getAssetsByAssetCode:
              summary: Filter the assets by their code
              value: '{"code":[{"operator":"IN","value":["code1","code2"]}]}'
            getAssetsByUpdatedDate:
              summary: Filter the assets by their update date
              value: '{"updated":[{"operator":">","value":"2018-07-04T10:00:00Z"}]}'
            getAssetsUpdatedOverPeriod:
              summary: Filter the assets that were updated over a period of time
              value: '{"updated":[{"operator":"NOT BETWEEN","value":["2018-07-04T10:00:00Z","2018-08-04T10:00:00Z"]}]}'
            getAssetsUpdatedSinceXDays:
              summary: Filter the assets that were updated since X days
              value: '{"updated":[{"operator":"SINCE LAST N DAYS","value":4}]}'
        - name: channel
          in: query
          description: |
            Filter asset values to return scopable asset attributes for the given channel as well as the non localizable/non scopable asset attributes,
            for more details see the [Filter asset values by channel](https://api.akeneo.com/documentation/filter.html#asset-values-by-channel) section.
          required: false
          schema:
            type: string
          example: ecommerce
        - name: locales
          in: query
          description: |
            Filter asset values to return localizable asset attributes for the given locales as well as the non localizable/non scopable asset attributes,
            for more details see the [Filter asset values by locale](https://api.akeneo.com/documentation/filter.html#asset-values-by-locale) section.
          required: false
          schema:
            type: string
          example: en_US,fr_FR
        - in: path
