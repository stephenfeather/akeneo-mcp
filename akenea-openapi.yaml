  /api/rest/v1/products-uuid/search:
    post:
      operationId: post_products_uuid_search
      x-visibility: public
      summary: Search list of products
      description: |
        This endpoint allows you to search for products that match the filters provided in the request body.
        Products are paginated and can be filtered by scope, locales, attributes, and other criteria.
        User-group-based permissions are applied to the products you request.

        Important limitations
        - The maximum number of attributes in the request body is 800.
        - The maximum number of search criteria is 20.
        - The maximum number of items in an array (e.g., values for filters like `IN` or `NOT IN`) is 800.
      tags:
        - Product [uuid]
      security:
        - bearerToken: []
      parameters:
        - in: query
          name: pagination_type
          description: |
            Specify which pagination method to use for navigating through large datasets.
            It is useful for choosing between different pagination strategies based on your specific use case and performance requirements.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: *ref_8
          example: page
        - in: query
          name: page
          description: |
            Specify which page of results to retrieve when using pagination.
            It is useful for navigating through large datasets by breaking them into smaller, manageable pages.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: *ref_9
          example: 1
        - in: query
          name: search_after
          description: |
            Cursor when using the `search_after` pagination method type.
