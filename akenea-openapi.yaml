  /api/rest/v1/categories:
    get:
      operationId: get_categories
      x-visibility: public
      summary: Get the list of categories
      description: |
        This endpoint allows you to get a list of categories. Categories are paginated and sorted by `root/left`.
        You can filter the categories by using the `search` query parameter, which supports searching by category code or label.
        The response includes the category's code, parent code, labels, values, and channel requirements.
        You can also specify the `with_position` query parameter to include the position of the category in its level.
        The `with_enriched_attributes` query parameter allows you to include enriched attributes.
      tags:
        - Category
      security:
        - bearerToken: []
      parameters:
        - name: search
          in: query
          description: |
            The `search` query parameter allows you to filter categories based on specific criteria.
            For more details see the [Filters section](https://api.akeneo.com/documentation/filter.html#filter-categories).
          required: false
          schema:
            type: string
          examples:
            getOnlyRootCategories:
              summary: Filter the categories to get only root categories
              value: '{"is_root":[{"operator":"=","value":true}]}'
            getCategoriesByParent:
              summary: Filter the categories by parent
              value: '{"parent":[{"operator":"=","value":"categoryA"}]}'
            getCategoriesByCode:
              summary: Filter the categories by their code
              value: '{"code":[{"operator":"IN","value":["category_code1","category_code2"]}]}'
            getCategoriesByUpdatedDate:
              summary: Filter the categories by their update date
              value: '{"updated":[{"operator":">","value":"2021-05-17T10:00:00Z"}]}'
        - in: query
          name: page
          description: |
            Specify which page of results to retrieve when using pagination.
            It is useful for navigating through large datasets by breaking them into smaller, manageable pages.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: *ref_9
          example: 1
        - in: query
          name: limit
          description: |
            Specify the maximum number of results to return per page.
            It is useful for controlling the amount of data returned in a single request, especially when dealing with large datasets.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: *ref_11
          example: 100
        - in: query
          name: with_count
          description: |
            Return the count of items in the response.
            Be careful with that, on a big catalog, it can decrease performance in a significant way.
            It is useful for understanding the size of the dataset being returned, especially when dealing with large collections.
            Use it judiciously to avoid performance issues.
          required: false
          schema: *ref_12
          example: true
        - in: query
          name: with_position
          description: |
            Return information about the category's position within its category tree.
            When set to `true`, the response will include the position of the category in its level, which can be useful for understanding the hierarchy and order of categories.
            If set to `false`, the response will not include this information, which can improve performance.
          required: false
          schema: &ref_112
            type: boolean
            default: false
          example: true
        - in: query
          name: with_enriched_attributes
          description: |
            Return the attribute values of the category.
            When set to `true`, the response will include the values of all attributes associated with the category.
            This is useful for retrieving detailed information about the category's attributes, such as their values and configurations.
            If set to `false`, the response will not include attribute values, which can improve performance
          required: false
          schema: &ref_113
