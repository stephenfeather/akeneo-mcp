                        It is a JSON string that follows this format:
                        '{"code":"product_model_code", "attribute":"attribute_code", "scope":"channel_code","locale":"locale_code"}'.
                        You have to either use this field or the `product` field, but not both at the same time.
                      example: '{"code":"product_model_code", "attribute":"attribute_code", "scope":null,"locale":null}'
                    file:
                      type: string
                      description: The binaries of the file
                      format: binary
                  required:
                    - file
                    - product_model
            examples:
              product:
                summary: Create a media file for a product
                value:
                  product: '{"identifier":"product_identifier", "attribute":"attribute_code", "scope":null,"locale":null}'
                  file: ''
              product_model:
                summary: Create a media file for a product model
                value:
                  product_model: '{"code":"product_model_code", "attribute":"attribute_code", "scope":null,"locale":null}'
                  file: ''
