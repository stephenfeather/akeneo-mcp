  /api/rest/v1/products:
    get:
      operationId: get_products
      x-visibility: public
      summary: Get list of products
      description: |
        This endpoint allows you to get a list of products.
        Products are paginated and they can be filtered.
        Permissions based on your user groups are applied to the set of products you request.
      tags:
        - Product [identifier]
      security:
        - bearerToken: []
      parameters:
        - name: search
          in: query
          description: |
            Filter products,
            for more details see the [Filters](https://api.akeneo.com/documentation/filter.html) section.
          required: false
          schema:
            type: string
          examples:
            getProductsByCategory:
              summary: Filter the products by their category
              value: '{"categories":[{"operator":"IN","value":["winter_collection"]}]}'
            getProductsByCategoryButNotInAnother:
              summary: Filter the products categorized on the Winter Collection category and that are not categorized on the Accessories category
              value: '{"categories":[{"operator":"IN","value":["winter_collection"]},{"operator":"NOT IN","value":["accessories"]}]}'
            getProductsByStatus:
              summary: Filter the products by their status
              value: '{"enabled":[{"operator":"=","value":false}]}'
            getProductsByCompleteness:
              summary: Filter the products by their completeness
              value: '{"completeness":[{"operator":"=","value":50,"scope":"ecommerce"}]}'
            getProducts100PercentComplete:
              summary: Filter the products that are 100% complete on both the en_US and fr_FR locales for the ecommerce channel
              value: '{"completeness":[{"operator":"GREATER OR EQUALS THAN ON ALL LOCALES","value":100,"locales":["en_US","fr_FR"],"scope":"ecommerce"}]}'
            getProductsByGroup:
              summary: Filter the products by their group
              value: '{"groups":[{"operator":"IN","value":["promotion"]}]}'
            getProductsByFamily:
              summary: Filter the products by their family
              value: '{"family":[{"operator":"NOT IN","value":["camcorders","digital_cameras"]}]}'
            getProductsByCreationDate:
              summary: Filter the products by their creation date
              value: '{"created":[{"operator":"=","value":"2016-07-04 10:00:00"}]}'
            getProductsByUpdatedDate:
              summary: Filter the products updated since X days
              value: '{"updated":[{"operator":"SINCE LAST N DAYS","value":4}]}'
            getVariantProductsByProductModelCode:
              summary: Filter the variant products by their parent
              value: '{"parent":[{"operator":"IN","value":["tops"]}]}'
            getVariantProductsBySubProductModelCodes:
              summary: Filter the variant products by their sub product model
              value: '{"parent":[{"operator":"IN","value":["tshirt_armor_blue","tshirt_armor_red"]}]}'
            getAllVariantProducts:
              summary: Get all variant products
              value: '{"parent":[{"operator":"NOT EMPTY"}]}'
            getAllSimpleProducts:
              summary: Get all simple products
              value: '{"parent":[{"operator":"EMPTY"}]}'
            getProductsByQualityScore:
              summary: Filter the products with a "D" for the ecommerce channel and en_US locale
              value: '{"quality_score":[{"operator":"IN","value":["D"],"scope":"ecommerce","locale":"en_US"}]}'
            getProductsWithMultipleQualityScores:
              summary: Filter the products with an "A" or "B" for the mobile channel and en_GB locale
              value: '{"quality_score":[{"operator":"IN","value":["A","B"],"scope":"mobile","locale":"en_GB"}]}'
            getEnabledProducts:
              summary: Get only enabled products
              value: '{"enabled":[{"operator":"=","value":true}]}'
            getEnabledProductsCompleteAtLeast70Percent:
              summary: Get only enabled products that are at least 70% complete on the ecommerce channel
              value: '{"enabled":[{"operator":"=","value":true}],"completeness":[{"operator":">","value":70,"scope":"ecommerce"}]}'
            getProductsByAttributeValue:
              summary: Filter the products by an attribute value
              value: '{"main_color":[{"operator":"IN","value":["purple"]}]}'
            getProductsWithSpecificDescription:
              summary: Filter the products having a description begining with Amazing on the en_US locale
              value: '{"description":[{"operator":"STARTS WITH","value":"Amazing","locale":"en_US"}]}'
            getProductsWithSpecificReleaseDate:
              summary: Filter the products that have a release date due after the 4th of July 2016 for the ecommerce channel
              value: '{"release_date":[{"operator":">","value":"2016-07-04","scope":"ecommerce"}]}'
            getProductsByDateOnly:
              summary: Filter products on a `pim_catalog_date` attribute using a full-day range (date-only)
              value: '{"release_date":[{"operator":"=","value":"2024-06-15","scope":"ecommerce"}]}'
            getProductsByIso8601DateTime:
              summary: Filter products on a `pim_catalog_date` attribute with `display_time` enabled using ISO 8601
              value: '{"release_date":[{"operator":"=","value":"2024-06-15T08:00:00Z","scope":"ecommerce"}]}'
            getProductsByDateRange:
              summary: Filter products on a `pim_catalog_date` attribute with a date-only range
              value: '{"release_date":[{"operator":"BETWEEN","value":["2024-06-01","2024-06-30"],"scope":"ecommerce"}]}'
            getProductsByIso8601DateTimeRange:
              summary: Filter products on a `pim_catalog_date` attribute with `display_time` enabled with an ISO 8601 range
              value: '{"release_date":[{"operator":"BETWEEN","value":["2024-06-15T08:00:00+00:00","2024-06-15T18:00:00+00:00"],"scope":"ecommerce"}]}'
            getProductsContainingText:
              summary: Filter the products containing a text in the name attribute
              value: '{"name":[{"operator":"CONTAINS","value":"shirt","locale":"en_US","scope":"mobile"}]}'
            getProductsByMultipleAttributeValues:
              summary: Filter the products by multiple attribute values
              value: '{"description":[{"operator":"STARTS WITH","value":"Amazing","locale":"en_US","scope":"ecommerce"}],"main_color":[{"operator":"IN","value":["purple"]}]}'
            getProductsByMultipleAttributeConditions:
              summary: Filter the products by multiple attribute conditions
              value: '{"description":[{"operator":"NOT EMPTY","locale":"en_US","scope":"ecommerce"},{"operator":"EMPTY","locale":"fr_FR","scope":"ecommerce"}]}'
