      operationId: get_catalog_mapped_products
      x-visibility: public
      summary: Get the list of mapped flattened products or simple products related to a catalog
      description: |
        This endpoint is available when the mapping is enabled on a specified catalog.
        When the mapping is in a basic mode, this endpoint allows you to get the list of all flattened products related to the catalog.
        When it's in models/variants mode, this endpoint allows you to get the list of simple products with all specified targets in the two levels of the mapping schema.
        Please, note that a disabled catalog can return an HTTP 200 with a payload containing an error message,
        for more details see the [App Catalog](https://api.akeneo.com/apps/catalogs.html#troubleshooting) section.
      tags:
        - Catalog products
      security:
        - appToken: []
      parameters:
        - in: path
          name: id
          description: |
            This path parameter is used to specify the unique identifier of the catalog you want to retrieve or manipulate.
            It is essential for identifying the specific entity in the API requests.
            Ensure that the catalog ID is correctly formatted and corresponds to an existing entity in the system.
          required: true
          schema: *ref_152
          example: 12351d98-200e-4bbc-aa19-7fdda1bd14f2
        - in: query
          name: search_after
          description: |
            Cursor when using the `search_after` pagination method type.
            It is essential for navigating through pages in cursor-based pagination, providing more efficient pagination for large datasets.
            Should never be set manually, see [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: *ref_10
          example: qaXbcde
        - in: query
          name: limit
          description: |
            Specify the maximum number of results to return per page.
            It is useful for controlling the amount of data returned in a single request, especially when dealing with large datasets.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: *ref_11
          example: 100
        - in: query
          name: updated_before
          description: |
            Filter products that have been updated BEFORE the provided date.
            It is useful for retrieving products that haven't been modified since a specific date, which is essential for historical data analysis and reporting.
            This filter uses the PIM products updated date and is only available on Catalogs endpoints.
          required: false
          schema: *ref_153
          example: '2025-05-17T10:00:00Z'
        - in: query
          name: updated_after
          description: |
            Filter products that have been updated AFTER the provided date.
            It is useful for retrieving only recently modified products, which is essential for synchronization and incremental data processing.
            This filter uses the PIM products updated date and is only available on Catalogs endpoints.
          required: false
          schema: *ref_154
          example: '2025-06-17T10:00:00Z'
