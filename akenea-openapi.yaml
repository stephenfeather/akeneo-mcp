            application/json:
              schema:
                title: Products
                type: object
                allOf:
                  - type: object
                    properties: *ref_42
                  - type: object
                    properties:
                      current_page:
                        type: integer
                        description: Current page number
                        example: 1
                      items_count:
                        type: integer
                        description: Total number of items (only if `with_count` parameter is set to true)
                        example: 5
                      _embedded:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              allOf:
                                - type: object
                                  properties:
                                    _links:
                                      type: object
                                      properties:
                                        self:
                                          type: object
                                          properties:
                                            href:
                                              type: string
                                              description: URI of the resource
                                              example: https://demo.akeneo.com/api/rest/v1/products/top
                                - type: object
                                  properties: &ref_45
                                    uuid:
                                      type: string
                                      description: Product UUID
                                      example: fc24e6c3-933c-4a93-8a81-e5c703d134d5
                                    identifier:
                                      type: string
                                      description: Product identifier, i.e. the value of the only `pim_catalog_identifier` attribute
                                      example: bl1850b
                                    enabled:
                                      type: boolean
                                      description: Whether the product is enabled
                                      default: true
                                      example: true
                                    family:
                                      type:
                                        - string
                                        - 'null'
                                      description: |
                                        [Family](https://api.akeneo.com/api-reference.html#Family) code from which the product inherits its attributes and attributes requirements.
                                        In the case of variant product, the given family should be the same as the product model family.
                                      default: null only in the case of a non variant product
                                      x-validation-rules: It is equal to an existing family code
                                      example: smartphone
                                    categories:
                                      type: array
                                      description: Codes of the [categories](https://api.akeneo.com/api-reference.html#Category) in which the product is classified.
                                      items:
                                        type: string
                                      default: []
                                      x-validation-rules: Each string of the array is equal to an existing category code
                                      example:
                                        - smartphones
                                        - electronics
                                    groups:
                                      type: array
                                      description: |
                                        Codes of the groups to which the product belong.
                                        Each string of the array is equal to an existing group code.
                                      items:
                                        type: string
                                      default: []
                                      x-validation-rules: Each string of the array is equal to an existing group code
                                      example:
                                        - summer_collection
                                        - sale
                                    parent:
                                      type:
                                        - string
                                        - 'null'
                                      description: Code of the parent [product model](https://api.akeneo.com/api-reference.html#Productmodel) when the product is a variant
                                      default: null
                                      x-validation-rules: |
                                        - It is equal to an existing product model.
                                        - This product model has the same family variant as the one given in the `family_variant field`.
                                      example: my_super_battery
                                    values:
                                      type: object
                                      description: |
                                        Product attributes values.
                                        Each key is an attribute code, and the value is an array of value objects for that attribute.
                                        See [documentation](https://api.akeneo.com/concepts/products.html#focus-on-the-product-values) for details.
                                      patternProperties:
                                        ^\w+$:
                                          type: array
                                          items:
                                            type: object
                                            required: *ref_1
                                            description: |
                                              A value for a given attribute, for a given locale/scope combination.
                                              - locale: Locale code, or null if not localizable.
                                              - scope: Channel code, or null if not scopable.
                                              - data: The value for this attribute/locale/scope. Type and format depend on the attribute type (see Akeneo docs).
                                              - linked_data: Additional data for select/multiselect/asset attributes. Read-only.
                                              - attribute_type: The type of the value's attribute. Read-only.
                                              - reference_data_name: Reference entity code or asset family code. Read-only.
                                            properties: *ref_2
                                      x-validation-rules: Validation rules detailed in Product values section
                                      example:
                                        description:
                                          - data: T-shirt long sleeves Winter special, 100% wool
                                            locale: null
                                            scope: null
                                    associations:
                                      type: object
                                      description: Several associations related to groups, product models and/or other products, grouped by association types
                                      patternProperties:
                                        ^\w+$:
                                          type: object
                                          properties:
                                            groups:
                                              type: array
                                              description: Array of groups codes with which the product is in relation
                                              items:
                                                type: string
                                            products:
                                              type: array
                                              description: Array of product identifiers with which the product is in relation
                                              items:
                                                type: string
                                            product_models:
                                              type: array
                                              description: Array of product model codes with which the product is in relation
                                              items:
                                                type: string
                                      additionalProperties: false
                                      x-validation-rules: |
                                        - The `associationTypeCode` is the code of an existing association type.
                                        - Each string in the array of the property `groups` is the code of an existing group.
                                        - Each string in the array of the property `products` is the identifier of an existing product.
                                        - Each string in the array of the property `product_models` is the code of an existing product model.
                                      example:
                                        X_SELL:
                                          groups: []
                                          products:
                                            - product_1
                                            - product_2
                                          product_models:
                                            - product_model_1
                                        UPSELL:
                                          groups:
                                            - group_1
                                          products: []
                                          product_models: []
                                    quantified_associations:
                                      type: object
                                      description: Several quantified associations related to products and/or product models, grouped by quantified association types
                                      patternProperties:
                                        ^\w+$:
                                          type: object
                                          properties:
                                            products:
                                              type: array
                                              description: Array of objects containing product identifiers and quantities with which the product is in relation
                                              items:
                                                type: object
                                                properties:
                                                  identifier:
                                                    type: string
                                                  quantity:
                                                    type: integer
                                            product_models:
                                              type: array
                                              description: Array of objects containing product model codes and quantities with which the product is in relation
                                              items:
                                                type: object
                                                properties:
                                                  identifier:
                                                    type: string
                                                  quantity:
                                                    type: integer
                                      x-validation-rules: |
                                        - The `quantifiedAssociationTypeCode` is the code of an existing association type which provides quantity information.
                                        - Each object in the array of the property `products` contains the identifier of an existing product and the quantity of it.
                                        - Each object in the array of the property `product_models` contains the code of an existing product model and the quantity of it.
