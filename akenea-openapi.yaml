openapi: 3.1.0
info:
  title: Akeneo API REFERENCE
  version: 1.0.0
  description: |
    This is the reference documentation for the Akeneo PIM REST API.
    It provides detailed information about the available endpoints, request and response formats, and authentication methods.

    For more information, visit the [Akeneo PIM documentation](https://docs.akeneo.com/).
  license:
    name: Open Software License 3.0
    url: http://opensource.org/licenses/OSL-3.0
  contact:
    name: Akeneo Support
    url: https://www.akeneo.com/support-help-center/
    email: contact@akeneo.com
servers:
  - url: '{your-pim-url}'
    variables:
      your-pim-url:
        default: ''
        description: 'Set the PIM url you want to target ex: https://my-pim.cloud.akeneo.com or https://localhost:8443'
tags:
  - name: Product [uuid]
    description: |
      A product is a single item that can be managed in the PIM.
      It can have various attributes and values, and can be associated with product models, categories, and other entities.
      Products are the core entities in the PIM and are used to manage the product information.
      We strongly recommend using this endpoint for its reliability and flexibility.
      UUIDs, or Universally Unique Identifiers, are guaranteed to be unique and never change, even if other product identifiers like SKUs are modified.
      This ensures consistent product identification regardless of future changes.
      Additionally, UUIDs allow interaction with products that lack a traditional identifier.
  - name: Product [identifier]
    description: |
      A product is a single item that can be managed in the PIM.
      It can have various attributes and values, and can be associated with product models, categories, and other entities.
      Products are the core entities in the PIM and are used to manage the product information.
      This endpoint is useful when you already have a product identifier within your systems.
      This identifier, which could be a SKU or internal code, can be used to directly interact with the corresponding product in our API.
      This simplifies integration for workflows that rely on existing product identification methods.
  - name: Product model
    description: |
      A product model is a template for products that share the same attributes and values.
      It allows you to create a hierarchy of products, where a product model can have several variants.
      A product model can also have its own attributes and values, which are inherited by its variants.
  - name: Product media file
    description: |
      A media file is a file that can be attached to a product, product model, category, or asset.
      It can be an image, a video, a PDF, or any other type of file.
      Media files are used to enrich the product information and provide additional context to the products.
  - name: Jobs
    description: |
      A job is a process that can be executed in the PIM to perform various tasks, such as importing or exporting data.
      Jobs can be used to synchronize data between the PIM and external systems, or to perform bulk operations on products, product models, or other entities.
  - name: Family
    description: |
      A family is a set of attributes that are shared by products belonging to this family.
      In other words, a family can be considered as a template for products.
      A product family can use all of the attributes available in the PIM.
      Several families of products can use the same attributes.
  - name: Family variant
    description: |
      A family variant is a specific type of family that allows you to create variants of a product model.
      It allows you to define the attributes and values that are specific to the variants of a product model.
      Family variants are used to manage the relationships between product models and their variants.
  - name: Attribute
    description: |
      An attribute is a piece of information that can be associated with a product or product model.
      Attributes can be used to store various types of data, such as text, numbers, dates, or media files.
      They are used to define the characteristics of products and to provide additional information about them.
  - name: Attribute option
    description: |
      An attribute option is a value that can be associated with an attribute.
      For example, if you have an attribute called "Color", the options could be "Red", "Blue", "Green", etc.
      Options are used to provide predefined values for attributes, making it easier to manage and maintain product data.
  - name: Attribute group
    description: |
      An attribute group is a way to organize attributes in the PIM.
      It allows you to group related attributes together, making it easier to manage and maintain product data.
      For example, you could have an attribute group called "Specifications" that contains attributes like "Weight", "Dimensions", and "Material".
  - name: Association type
    description: |
      An association type is a way to define the relationship between products or product models.
      It allows you to create links between products, such as "related products", "up-sell products", or "cross-sell products".
      Association types are used to manage the relationships between products and to provide additional context to the product information.
  - name: Category
    description: |
      A category is a way of classifying products.
      Categories constitute category trees and in Akeneo, you can have multiple category trees with an unlimited number of levels (categories, subcategories, subsubcategories..).
  - name: Channel
    description: |
      A channel is a way to define how products are presented in different contexts, such as online stores, mobile applications, or print catalogs.
      Channels can have different configurations, such as currencies, locales, and measurement systems.
      They allow you to tailor the product information to specific markets or audiences.
  - name: Locale
    description: |
      A locale is a combination of a language (English, German, French...) and a country (United States, United Kingdom, France...).
      Examples: English UK (en_GB), English US (en_US), English AU (en_AU).
      You can have one or more locales activated in your PIM.
  - name: Currency
    description: |
      A currency is a unit of exchange that is used to price products.
      Currencies are used in the PIM to define the prices of products in different markets.
  - name: Measurement family
    description: |
      A measurement family is a set of comparable units used to measure a specific physical quantity, such as Area, Weight, or Power.
      For example, the "Weight" measurement family can group units like "Kilogram" and "Pound" together.
      Each family has a standard unit for conversions (e.g., "Kilogram"), and all other units within that family include their conversion formulas.
      These families are used for metric attributes, allowing product data to be entered in one unit and automatically converted for different channels or locales.
  - name: Reference entity
    description: |
      A reference entity is a custom entity that can be used to store additional information about products or product models.
      It allows you to create your own entities with their own attributes and values, which can be linked to products or product models.
      Reference entities are useful for managing complex data structures or for integrating with external systems.
  - name: Reference entity attribute
    description: |
      A reference entity attribute is a piece of information that can be associated with a reference entity.
      Reference entity attributes can be used to store various types of data, such as text, numbers, dates, or media files.
      They are used to define the characteristics of reference entities and to provide additional information about them.
  - name: Reference entity attribute option
    description: |
      A reference entity attribute option is a value that can be associated with a reference entity attribute.
      For example, if you have a reference entity attribute called "Category", the options could be "Electronics", "Clothing", "Books", etc.
      Options are used to provide predefined values for reference entity attributes, making it easier to manage and maintain reference entity data.
  - name: Reference entity record
    description: |
      A reference entity record is a specific instance of a reference entity.
      It contains the values for the attributes defined in the reference entity.
      Reference entity records can be linked to products or product models, allowing you to associate additional information with them.
  - name: Reference entity media file
    description: |
      A reference entity media file is a file that can be attached to a reference entity record.
      It can be an image, a video, a PDF, or any other type of file.
      Reference entity media files are used to enrich the reference entity information and provide additional context to the reference entities.
  - name: Asset family
    description: |
      An asset family is a set of attributes that are shared by assets belonging to this family.
      In other words, an asset family can be considered as a template for assets.
  - name: Asset attribute
    description: |
      An asset attribute is a piece of information that can be associated with an asset.
      Asset attributes can be used to store various types of data, such as text, numbers, dates, or media files.
      They are used to define the characteristics of assets and to provide additional information about them.
  - name: Asset attribute option
    description: |
      An asset attribute option is a value that can be associated with an asset attribute.
      For example, if you have an asset attribute called "Type", the options could be "Image", "Video", "Document", etc.
      Options are used to provide predefined values for asset attributes, making it easier to manage and maintain asset data.
  - name: Asset media file
    description: |
      An asset media file is a file that can be attached to an asset family or an asset.
      It can be an image, a video, a PDF, or any other type of file.
      Asset media files are used to enrich the asset information and provide additional context to the assets.
  - name: Asset
    description: |
      An asset is a flexible object that makes it possible to enrich products with images, videos, documents…
      An asset must be part of an asset family. That way, it will have its own attributes and lifecycle.
      Assets can be linked to products and product models, in order to enrich them.
  - name: Catalogs
    description: |
      A catalog is a collection of products that can be managed in the PIM.
      It allows you to create a subset of products that can be used in specific contexts, such as online stores, mobile applications, or print catalogs.
      Catalogs can have their own configurations, such as channels, locales, and measurement systems.
  - name: Catalog products
    description: |
      A catalog contains a selection of products from the PIM, intended to be synchronized with a third-party application via the API.
      The Catalog products endpoint allows you to retrieve the list of products for a given catalog, with options to filter, paginate, and select the returned fields.
      Each returned product includes its attributes, values, status information, and associated references, all in the context of the catalog.
      This endpoint is mainly used by Apps to synchronize product data between Akeneo PIM and external platforms, while respecting access rights and catalog configuration.
  - name: Mapping schema for products
    description: |
      The mapping schema for products defines the expected structure of product data when synchronizing via the API.
      It describes the fields, their types, constraints, and transformation rules applied during the export or import of products in a catalog connected to an App.
      This schema ensures data consistency between Akeneo PIM and third-party applications by clarifying how PIM attributes correspond to those expected by the App.
      For each field, the schema specifies the data type (text, number, boolean, etc.), whether the field is required or optional, and any allowed values or transformations to apply.
  - name: Overview
    description: |
      This API reference provides comprehensive documentation for the Akeneo PIM REST API.
      It describes all available endpoints, request and response formats, authentication methods, and error codes.
      The Akeneo PIM REST API enables you to interact programmatically with your PIM instance, allowing you to manage products, product models, attributes, categories, assets, reference entities, and more.
      You can use the API to integrate Akeneo PIM with other systems, automate data flows, and build custom applications.
      All API endpoints are organized by resource type and support standard HTTP methods (GET, POST, PUT, PATCH, DELETE).
      Authentication is required for all endpoints and is based on OAuth 2.0 or HTTP Basic authentication.
      For more details, please refer to the [official Akeneo API documentation](https://api.akeneo.com/).
  - name: Authentication
    description: |
      The Authentication endpoints provide methods to authenticate and authorize access to the Akeneo PIM API.
      You can use these endpoints to obtain an access token, which is required for accessing protected resources in the API.
      The authentication process typically involves providing credentials (username and password) or using OAuth 2.0 for secure access.
  - name: System
    description: |
      The System endpoints provide information about the Akeneo PIM instance and its environment.
      You can use these endpoints to retrieve details such as the PIM version, edition, enabled features, and system health.
      This information is useful for monitoring, troubleshooting, and ensuring compatibility with integrations or applications that interact with the PIM API.
  - name: Permissions
    description: |
      The Permissions endpoints allow you to retrieve the permissions for a given user.
      You can use these endpoints to get information about which channels and locales a user can view or edit.
  - name: Extensions
    description: |
      Extensions allow you to extend the Akeneo PIM user interface with custom components.
      They can be used to add new features or to modify the existing ones.
      Extensions are useful for integrating with external systems or for providing additional functionality to the PIM.
  - name: Workflows
    description: |
      The Workflows endpoints allow you to retrieve the configuration of the Workflows and Steps.
  - name: Workflow executions
    description: |
      The Workflow executions endpoints allow you to start workflows on products and product models.
  - name: Workflow tasks
    description: |
      The Tasks endpoints allow you to retrieve the tasks for each workflow steps, products and product models.
      It also allows you to manage the tasks by approving, rejecting or completing them.
  - name: Data Architect Agent
    description: |
      The Data Architect Agent endpoints allow you to create modelization suggestions for the data model designer.
      These suggestions can be used to improve the catalog structure and data quality.
  - name: Rule definition
    description: |
      Rule definitions automate product data enrichment by applying actions when conditions are met.
      These endpoints allow you to list, read, and create or update rule definitions.
paths:
  /api/rest/v1/products-uuid:
    get:
      operationId: get_products_uuid
      x-visibility: public
      summary: Get list of products
      description: |
        This endpoint allows you to get a list of products.
        Products are paginated and they can be filtered.
        Permissions based on your user groups are applied to the set of products you request.
      tags:
        - Product [uuid]
      security:
        - bearerToken: []
      parameters:
        - name: search
          in: query
          description: Filter products, for more details see the [Filters](https://api.akeneo.com/documentation/filter.html) section
          required: false
          schema:
            type: string
          examples:
            getProductsByProductUuid:
              summary: Filter the products by their uuid
              value: '{"uuid":[{"operator":"IN","value":["8945388d-cf5b-49af-8799-05d1ed6e296f", "941fe892-99dd-440f-b2a9-8eccb94248f0"]}]}'
            getProductsByCategory:
              summary: Filter the products by their category
              value: '{"categories":[{"operator":"IN","value":["winter_collection"]}]}'
            getProductsByCategoryButNotInAnother:
              summary: Filter the products categorized on the Winter Collection category and that are not categorized on the Accessories category
              value: '{"categories":[{"operator":"IN","value":["winter_collection"]},{"operator":"NOT IN","value":["accessories"]}]}'
            getProductsByStatus:
              summary: Filter the products by their status
              value: '{"enabled":[{"operator":"=","value":false}]}'
            getProductsByCompleteness:
              summary: Filter the products by their completeness
              value: '{"completeness":[{"operator":"=","value":50,"scope":"ecommerce"}]}'
            getProducts100PercentComplete:
              summary: Filter the products that are 100% complete on both the en_US and fr_FR locales for the ecommerce channel
              value: '{"completeness":[{"operator":"GREATER OR EQUALS THAN ON ALL LOCALES","value":100,"locales":["en_US","fr_FR"],"scope":"ecommerce"}]}'
            getProductsByGroup:
              summary: Filter the products by their group
              value: '{"groups":[{"operator":"IN","value":["promotion"]}]}'
            getProductsByFamily:
              summary: Filter the products by their family
              value: '{"family":[{"operator":"NOT IN","value":["camcorders","digital_cameras"]}]}'
            getProductsByCreationDate:
              summary: Filter the products by their creation date
              value: '{"created":[{"operator":"=","value":"2016-07-04 10:00:00"}]}'
            getProductsByUpdatedDate:
              summary: Filter the products updated since X days
              value: '{"updated":[{"operator":"SINCE LAST N DAYS","value":4}]}'
            getVariantProductsByProductModelCode:
              summary: Filter the variant products by their parent
              value: '{"parent":[{"operator":"IN","value":["tops"]}]}'
            getVariantProductsBySubProductModelCodes:
              summary: Filter the variant products by their sub product model
              value: '{"parent":[{"operator":"IN","value":["tshirt_armor_blue","tshirt_armor_red"]}]}'
            getAllVariantProducts:
              summary: Get all variant products
              value: '{"parent":[{"operator":"NOT EMPTY"}]}'
            getAllSimpleProducts:
              summary: Get all simple products
              value: '{"parent":[{"operator":"EMPTY"}]}'
            getProductsByQualityScore:
              summary: Filter the products with a "D" for the ecommerce channel and en_US locale
              value: '{"quality_score":[{"operator":"IN","value":["D"],"scope":"ecommerce","locale":"en_US"}]}'
            getProductsWithMultipleQualityScores:
              summary: Filter the products with an "A" or "B" for the mobile channel and en_GB locale
              value: '{"quality_score":[{"operator":"IN","value":["A","B"],"scope":"mobile","locale":"en_GB"}]}'
            getEnabledProducts:
              summary: Get only enabled products
              value: '{"enabled":[{"operator":"=","value":true}]}'
            getEnabledProductsCompleteAtLeast70Percent:
              summary: Get only enabled products that are at least 70% complete on the ecommerce channel
              value: '{"enabled":[{"operator":"=","value":true}],"completeness":[{"operator":">","value":70,"scope":"ecommerce"}]}'
            getProductsByAttributeValue:
              summary: Filter the products by an attribute value
              value: '{"main_color":[{"operator":"IN","value":["purple"]}]}'
            getProductsWithSpecificDescription:
              summary: Filter the products having a description begining with Amazing on the en_US locale
              value: '{"description":[{"operator":"STARTS WITH","value":"Amazing","locale":"en_US"}]}'
            getProductsWithSpecificReleaseDate:
              summary: Filter the products that have a release date due after the 4th of July 2016 for the ecommerce channel
              value: '{"release_date":[{"operator":">","value":"2016-07-04","scope":"ecommerce"}]}'
            getProductsByDateOnly:
              summary: Filter products on a `pim_catalog_date` attribute using a full-day range (date-only)
              value: '{"release_date":[{"operator":"=","value":"2024-06-15","scope":"ecommerce"}]}'
            getProductsByIso8601DateTime:
              summary: Filter products on a `pim_catalog_date` attribute with `display_time` enabled using ISO 8601
              value: '{"release_date":[{"operator":"=","value":"2024-06-15T08:00:00Z","scope":"ecommerce"}]}'
            getProductsByDateRange:
              summary: Filter products on a `pim_catalog_date` attribute with a date-only range
              value: '{"release_date":[{"operator":"BETWEEN","value":["2024-06-01","2024-06-30"],"scope":"ecommerce"}]}'
            getProductsByIso8601DateTimeRange:
              summary: Filter products on a `pim_catalog_date` attribute with `display_time` enabled with an ISO 8601 range
              value: '{"release_date":[{"operator":"BETWEEN","value":["2024-06-15T08:00:00+00:00","2024-06-15T18:00:00+00:00"],"scope":"ecommerce"}]}'
            getProductsContainingText:
              summary: Filter the products containing a text in the name attribute
              value: '{"name":[{"operator":"CONTAINS","value":"shirt","locale":"en_US","scope":"mobile"}]}'
            getProductsByMultipleAttributeValues:
              summary: Filter the products by multiple attribute values
              value: '{"description":[{"operator":"STARTS WITH","value":"Amazing","locale":"en_US","scope":"ecommerce"}],"main_color":[{"operator":"IN","value":["purple"]}]}'
            getProductsByMultipleAttributeConditions:
              summary: Filter the products by multiple attribute conditions
              value: '{"description":[{"operator":"NOT EMPTY","locale":"en_US","scope":"ecommerce"},{"operator":"EMPTY","locale":"fr_FR","scope":"ecommerce"}]}'
        - in: query
          name: scope
          description: |
            Filter product values to return scopable attributes for the given channel as well as the non localizable/non scopable attributes.
            It is useful for retrieving product information specific to a particular sales channel, which is essential for channel-specific applications.
            For more details see the [Filter product values via channel](https://api.akeneo.com/documentation/filter.html#via-channel) section.
          required: false
          schema: &ref_36
            type: string
          example: ecommerce
        - in: query
          name: locales
          description: |
            Filter product values to return localizable attributes for the given locales as well as the non localizable/non scopable attributes.
            It is useful for retrieving product information in specific languages, which is essential for multi-locale applications.
            For more details see the [Filter product values via locale](https://api.akeneo.com/documentation/filter.html#via-locale) section.
          required: false
          schema: &ref_37
            type: string
          example: en_US,fr_FR
        - in: query
          name: attributes
          description: |
            Filter product values to only return those concerning the given attributes.
            It is useful for limiting the response to specific attributes, reducing payload size and improving performance.
            For more details see the [Filter product values via attributes](https://api.akeneo.com/documentation/filter.html#via-attributes) section.
          required: false
          schema: &ref_38
            type: string
          example: name,description
        - in: query
          name: pagination_type
          description: |
            Specify which pagination method to use for navigating through large datasets.
            It is useful for choosing between different pagination strategies based on your specific use case and performance requirements.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: &ref_8
            type: string
            enum:
              - page
              - search_after
            default: page
          example: page
        - in: query
          name: page
          description: |
            Specify which page of results to retrieve when using pagination.
            It is useful for navigating through large datasets by breaking them into smaller, manageable pages.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: &ref_9
            type: integer
            default: 1
          example: 1
        - in: query
          name: search_after
          description: |
            Cursor when using the `search_after` pagination method type.
            It is essential for navigating through pages in cursor-based pagination, providing more efficient pagination for large datasets.
            Should never be set manually, see [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: &ref_10
            type: string
            default: cursor to the first page
          example: qaXbcde
        - in: query
          name: limit
          description: |
            Specify the maximum number of results to return per page.
            It is useful for controlling the amount of data returned in a single request, especially when dealing with large datasets.
            See [Pagination](https://api.akeneo.com/documentation/pagination.html) section for more details.
          required: false
          schema: &ref_11
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          example: 100
        - in: query
          name: search_scope
          description: |
            Filter scopes based on specific criteria.
            If you need to filter on several attributes on the same scope, you can use this parameter, to avoid repeating yourself for each attribute.
            For more details see the [Filters](https://api.akeneo.com/documentation/filter.html#search_scope-query-parameter) section.
          required: false
          schema: &ref_39
            type: string
          example: ecommerce
        - in: query
          name: search_locale
          description: |
            Filter locales based on specific criteria.
            If you need to filter on several attributes on the same locale, you can use this parameter, to avoid repeating yourself for each attribute.
            For more details see the [Filters](https://api.akeneo.com/documentation/filter.html#search_locale-query-parameter) section.
          required: false
          schema: &ref_40
            type: string
          example: en_US
        - in: query
          name: convert_measurements
          description: |
            Convert measurement attribute values to the appropriate unit for the channel provided by the `scope` parameter.

            When set to `true`, the `scope` parameter is required.
          schema: &ref_41
            type: boolean
            default: false
          required: false
          example: true
        - in: query
          name: with_count
          description: |
            Return the count of items in the response.
            Be careful with that, on a big catalog, it can decrease performance in a significant way.
            It is useful for understanding the size of the dataset being returned, especially when dealing with large collections.
            Use it judiciously to avoid performance issues.
          required: false
          schema: &ref_12
            type: boolean
            default: false
          example: true
        - in: query
          name: with_attribute_options
          description: |
            Return labels of attribute options in the response.
            When set to `true`, the response will include human-readable labels for attribute options alongside their codes.
            This is useful for displaying human-readable labels instead of just option codes, which improves the user experience in frontend applications.
            If set to `false`, the response will only include option codes, which can improve performance.
            See [the `linked_data` format](https://api.akeneo.com/concepts/products.html#the-linked_data-format) section for more details.
          required: false
          schema: &ref_15
            type: boolean
            default: false
          example: true
        - in: query
          name: with_asset_share_links
          description: |
            Return asset collection share link URLs in the response.
            When set to `true`, the response will include direct URLs to asset collections for sharing purposes.
            This is useful for accessing direct links to asset collections, which can be used for sharing or external integrations.
            If set to `false`, the response will not include share links, which can improve performance.
            See [the `linked_data` format](https://api.akeneo.com/concepts/products.html#the-linked_data-format) for more details.
          required: false
          schema: &ref_16
            type: boolean
            default: false
          example: true
        - in: query
          name: with_enabled_assets_only
          description: |
            When set to `true`, disabled assets are excluded from asset collection values in the response.
            Only assets with `status: "enabled"` are returned.
            When set to `false` (default), all assets are returned regardless of their status.
          required: false
          schema: &ref_17
            type: boolean
            default: false
          example: true
        - in: query
          name: with_quality_scores
          description: |
            Return product quality scores in the response.
            When set to `true`, the response will include quality score information for each product.
            This is useful for assessing and monitoring product data quality, which is essential for maintaining high data standards and improving product information.
            If set to `false`, the response will not include quality scores, which can improve performance.
          required: false
          schema: &ref_18
            type: boolean
            default: false
          example: true
        - in: query
          name: with_completenesses
          description: |
            Return product completenesses information in the response.
            When set to `true`, the response will include detailed completeness information for each product.
            This is useful for understanding the data quality and completeness of products, which is essential for product management and quality assurance.
            If set to `false`, the response will not include completeness information, which can improve performance.
          required: false
          schema: &ref_19
            type: boolean
            default: false
          example: true
        - in: query
          name: with_root_parent
          description: |
            Return the root parent product model code of a variant in the response.
            When set to `true`, the response will include the root parent product model code for each variant product.
            This is useful for understanding the hierarchical relationship between product variants and their parent models, which is essential for product catalog navigation.
            If set to `false`, the response will not include parent model information, which can improve performance.
          required: false
          schema: &ref_20
            type: boolean
            default: false
          example: true
        - in: query
          name: with_workflow_execution_statuses
          description: |
            Return an array of workflow_execution_statuses directly associated with the requested entity (product or product model) in the response.
            Statuses are level-specific and are not inherited from parent models. For a complete overview of a variant product, you must query the variant itself and its parent model(s) in separate requests.
            Each workflow object contains:
            - The overall execution status (e.g., in_progress, completed).
            - A list of all associated tasks.
          required: false
          schema: &ref_21
            type: boolean
            default: false
          example: true
      responses:
        '200':
          description: |
            Returns products paginated.
            The response is paginated and includes links to navigate through the pages.
          content: &ref_13
            application/json:
              schema:
                title: Products
                type: object
                allOf:
                  - type: object
                    properties: &ref_42
                      _links:
                        type: object
                        properties:
                          self:
                            type: object
                            properties:
                              href:
                                type: string
