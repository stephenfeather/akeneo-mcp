components:
  securitySchemes:
    basicToken:
      scheme: basic
      type: http
      description: |
        HTTP Basic authentication using user credentials.
        [More information here](https://api.akeneo.com/documentation/authentication.html)
    bearerToken:
      scheme: bearer
      type: http
      description: |
        Bearer token obtained via the "Password Grant" flow.
        This token authenticates a user, is valid for one hour, and can be refreshed using a refresh token.
        [More information here](https://api.akeneo.com/documentation/authentication.html)
    appToken:
      scheme: bearer
      type: http
      description: |
        Bearer token for Apps, obtained via the OAuth 2.0 flow.
        This permanent token allows an application to make requests on behalf of a user.
        [More information here](https://api.akeneo.com/apps/authentication-and-authorization.html)
