    patch:
      operationId: patch_workflow_tasks_by_uuid
      x-visibility: public
      summary: Update a Workflow Task's Status (Approve, Reject, Complete)
      description: |
        Completes or approves/rejects a task.
        The request body's structure depends on the action being performed.

        - To **approve** a 'review' task, set status to `approved`.
        - To **complete** an 'enrichment' task, set status to `completed`.
        - To **reject** a 'review' task, set status to `rejected`, provide `send_back_to_step_uuid`, and optionally provide `rejected_attributes` to specify details about rejected attributes.
      tags:
        - Workflow tasks
      security:
        - bearerToken: []
      parameters:
        - in: path
          name: uuid
          description: |
            This path parameter is used to specify the unique identifier of the entity you want to retrieve or manipulate.
            It is essential for identifying the specific entity in the API requests.
            Ensure that the UUID is correctly formatted and corresponds to an existing entity in the system.
          required: true
          schema: *ref_23
          example: 123e4567-e89b-12d3-a456-426614174000
      requestBody:
        description: The action to perform on the task, determined by the payload
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required:
                    - status
                    - send_back_to_step_uuid
                  description: Payload for rejecting a review task
                  properties:
                    status:
                      type: string
                      description: Must be 'rejected' for this action
                      enum:
                        - rejected
                    send_back_to_step_uuid:
                      type: string
                      format: uuid
                      description: The UUID of the workflow step to which the task should be returned
                      example: 123e4567-e89b-12d3-a456-426614174000
                    rejected_attributes:
                      type: object
                      additionalProperties:
                        type: array
                        items:
                          type: object
                          required:
                            - comment
                            - locale
                            - scope
                          properties:
                            comment:
                              type: string
                              description: Comment about the rejection reason for this attribute.
                            locale:
                              type:
                                - string
                                - 'null'
                              description: Locale code, or null if not applicable.
                            scope:
                              type:
                                - string
                                - 'null'
                              description: Scope code, or null if not applicable.
                      description: |
                        Optionally provides details about which attributes were rejected.
                        For each attribute name you can specify a comment, the locale, and the scope for the rejection.
                - type: object
                  required:
                    - status
                  description: Payload for completing an enrichment task
                  properties:
                    status:
                      type: string
                      enum:
                        - completed
                - type: object
                  required:
                    - status
                  description: Payload for approving a review task
                  properties:
                    status:
                      type: string
                      enum:
                        - approved
            examples:
              rejectTask:
                summary: Example for Rejecting a Task
                value:
                  status: rejected
                  send_back_to_step_uuid: 123e4567-e89b-12d3-a456-426614174000
                  rejected_attributes:
                    name:
                      - comment: ''
                        locale: null
                        scope: null
                    description:
                      - comment: Wrong description
                        locale: en_US
                        scope: ecommerce
                      - comment: ''
                        locale: fr_FR
                        scope: mobile
              completeTask:
                summary: Example for Completing a Task
                value:
                  status: completed
              approveTask:
                summary: Example for Approving a Task
                value:
                  status: approved
