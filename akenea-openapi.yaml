          multipart/form-data:
            schema:
              oneOf:
                - type: object
                  properties:
                    product:
                      type:
                        - string
                        - 'null'
                      description: |
                        The product to which the media file will be associated.
                        It is a JSON string that follows this format
                        '{"identifier":"product_identifier", "attribute":"attribute_code", "scope":"channel_code","locale":"locale_code"}'.
