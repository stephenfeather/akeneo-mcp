  /api/oauth/v1/token:
    post:
      operationId: post_token
      x-visibility: public
      summary: Get an authentication token
      description: |
        This endpoint allows you to get an authentication token. 
        No need to be authenticated to use this endpoint. 
        Want to get your token directly in the API reference? 
        Check the [Get your API token guide](https://api.akeneo.com/documentation/authentication.html#token-generation).
      tags:
        - Authentication
      security:
        - basicToken: []
      parameters:
        - in: header
          name: Content-Type
          description: |
            This header indicates the media type of the resource being sent to the server.
            It is used to specify the format of the request body, allowing the server to correctly interpret the data being sent.
            Equal to 'application/json' or 'application/x-www-form-urlencoded', no other value allowed.
          required: true
          schema: *ref_76
          example: application/json
        - in: header
          name: Authorization
          description: |
            This header is used to authenticate requests to the API.
            Equal to 'Basic xx', where 'xx' is the base 64 encoding of the client id and secret. 
            Find out how to generate them in the [Client ID/secret generation](https://api.akeneo.com/documentation/authentication.html#client-idsecret-generation) section.
          required: true
          schema:
            type: string
      x-no-token: true
      x-form-data: true
      requestBody:
        description: |
          Request body for the token generation endpoint.
          This endpoint is used to generate an access token for the Akeneo PIM API.
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - grant_type
              properties:
                username:
                  description: |
                    Your PIM username, field username in your PIM connection settings. 
                    See [here](https://api.akeneo.com/documentation/authentication.html#token-generation) for more details.
                  type: string
                  example: my_username_9364
                password:
                  description: |
                    Your PIM password, field password in your PIM connection settings. 
                    See [here](https://api.akeneo.com/documentation/authentication.html#token-generation) for more details.
                  type: string
                  example: 4e88d6350
                grant_type:
                  description: Always equal to `password`
                  type: string
                  default: password
                  example: password
            example:
              username: admin
              password: admin
              grant_type: password
      responses:
        '200':
          description: Return an authentication token
          x-no-entity: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Authentication token that should be given in every authenticated request to the API
                    example: ZTZmYjU4ZmQxZWNmMzk1M2NlYzA5NmFhNmIzVjExMzE4NmJmODBkZGIyYTliYmQyNjk2ZDQwZThmNjdiZDQzOQ
                  expires_in:
                    type: integer
                    description: Validity of the token given in seconds, 3600s = 1h by default
                    example: 3600
                  token_type:
                    type: string
                    description: Token type, always equal to `bearer`
                    example: bearer
                  scope:
                    type:
                      - string
                      - 'null'
                    description: Unused, always equal to `null`
                    example: null
                  refresh_token:
                    type: string
                    description: |
                      Use this token when your access token has expired. 
                      [See](https://api.akeneo.com/documentation/authentication.html#refresh-an-expired-token).
                    example: M3FlODI0OTE3ODMyNjViMzRiOWE5ODMyNWViMThkNDU5YzJjNjFiZjNkZWFjMzIyYjc4YTgzZWY1MjE5ZTY5Mw
              example:
                access_token: ZTZmYjU4ZmQxZWNmMzk1M2NlYzA5NmFhNmIzVjExMzE4NmJmODBkZGIyYTliYmQyNjk2ZDQwZThmNjdiZDQzOQ
                expires_in: 3600
                token_type: bearer
                scope: null
                refresh_token: M3FlODI0OTE3ODMyNjViMzRiOWE5ODMyNWViMThkNDU5YzJjNjFiZjNkZWFjMzIyYjc4YTgzZWY1MjE5ZTY5Mw
        '400':
          description: |
            This response indicates that the server cannot process the request due to a client error, such as malformed request syntax, invalid request message framing, or deceptive request routing.
            It is typically used when the server cannot understand the request due to invalid JSON or other client-side issues.
          content: *ref_43
        '415':
          description: |
            This response indicates that the `Content-type` header of the request is not supported by the server.
            The server expects the `Content-type` header to be `application/json`, and any other value will result in this error.
          content: *ref_7
        '422':
